<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pilotando a Meta</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary: #ff4757;
            --accent: #2ed573;
            --warning: #ffa502;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }

        .app-container {
            width: 100%;
            max-width: 450px;
            background: var(--card-bg);
            border-radius: 28px;
            padding: 24px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        header {
            text-align: center;
            margin-bottom: 20px;
        }

        header h1 {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: 0.5px;
            color: var(--text-main);
        }

        header p {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .progress-section {
            background: rgba(15, 23, 42, 0.6);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .section-title {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .percentage-display {
            font-size: 3rem;
            font-weight: 800;
            color: var(--accent);
            line-height: 1;
            margin-bottom: 12px;
            text-shadow: 0 0 20px rgba(46, 213, 115, 0.2);
        }

        .progress-bar-container {
            background-color: #334155;
            height: 16px;
            border-radius: 50px;
            overflow: hidden;
            width: 100%;
            margin-bottom: 10px;
        }

        .progress-bar {
            background: linear-gradient(90deg, var(--primary), var(--accent));
            height: 100%;
            width: 0%;
            border-radius: 50px;
            transition: width 0.5s ease-out;
        }

        .values-summary {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .values-summary span strong {
            color: var(--text-main);
            display: block;
            font-size: 1.05rem;
        }

        .hourly-section {
            background: rgba(15, 23, 42, 0.8);
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 71, 87, 0.15);
            position: relative;
        }

        .hourly-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .timer-badge {
            background-color: var(--primary);
            color: white;
            padding: 4px 10px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
            box-shadow: 0 0 10px rgba(255, 71, 87, 0.3);
        }

        .timer-badge.paused {
            background-color: #475569;
            box-shadow: none;
        }

        .hourly-bar-container {
            background-color: #334155;
            height: 10px;
            border-radius: 50px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .hourly-bar {
            background: var(--warning);
            height: 100%;
            width: 0%;
            border-radius: 50px;
            transition: width 0.3s ease, background-color 0.3s ease;
        }

        .hourly-bar.completed {
            background: var(--accent) !important;
            box-shadow: 0 0 8px rgba(46, 213, 115, 0.5);
        }

        .hourly-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .hourly-info strong {
            color: var(--text-main);
        }

        .action-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .btn-action {
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 18px;
            padding: 12px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s ease;
            box-shadow: 0 6px 15px rgba(255, 71, 87, 0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }

        .btn-action.secondary {
            background-color: #475569;
            box-shadow: 0 6px 15px rgba(71, 85, 105, 0.15);
        }

        .btn-action span {
            font-size: 1.1rem;
            font-weight: 800;
        }

        .meta-editor {
            display: none;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .meta-editor.active {
            display: block;
        }

        .meta-editor h3 {
            font-size: 0.85rem;
            margin-bottom: 8px;
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        .input-group input {
            flex: 1;
            background-color: #0f172a;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 10px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            text-align: center;
        }

        .btn-save {
            background-color: var(--accent);
            color: #0f172a;
            border: none;
            border-radius: 12px;
            padding: 10px 18px;
            font-weight: 600;
        }

        .earn-section {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .earn-input-group {
            display: flex;
            gap: 10px;
        }

        .earn-input-group input {
            flex: 1;
            background-color: #0f172a;
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 14px;
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            text-align: center;
        }

        .btn-add {
            background: linear-gradient(135deg, var(--accent), #20bf6b);
            color: #0f172a;
            border: none;
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 800;
            padding: 0 22px;
            cursor: pointer;
            box-shadow: 0 6px 15px rgba(46, 213, 115, 0.3);
        }

        .control-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-top: 5px;
        }

        .btn-ctrl {
            border: none;
            border-radius: 14px;
            padding: 12px;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            color: #0f172a;
        }

        .btn-ctrl-start { background-color: var(--accent); }
        .btn-ctrl-pause { background-color: var(--warning); }
        .btn-ctrl-reset { background-color: #475569; color: var(--text-main); }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <h1>PILOTANDO A META</h1>
            <p>Faturamento em tempo real</p>
        </header>

        <div class="progress-section">
            <div class="section-title">Progresso Diário</div>
            <div class="percentage-display" id="percentage">0%</div>
            <div class="progress-bar-container">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <div class="values-summary">
                <span>Faturado: <strong id="currentDisplay">R$ 0,00</strong></span>
                <span>Restam: <strong id="remainingDisplay">R$ 300,00</strong></span>
            </div>
        </div>

        <div class="hourly-section">
            <div class="hourly-header">
                <div class="section-title" style="margin: 0;">Ganhos desta hora</div>
                <div class="timer-badge" id="timerDisplay">60:00</div>
            </div>
            <div class="hourly-bar-container">
                <div class="hourly-bar" id="hourlyBar"></div>
            </div>
            <div class="hourly-info">
                <span>Faturado na hora: <strong id="hourlyEarnedDisplay">R$ 0,00</strong></span>
                <span>Meta/hr: <strong id="hourlyTargetDisplay">R$ 35,00</strong></span>
            </div>
        </div>

        <div class="action-grid">
            <button class="btn-action" onclick="toggleMetaEditor('hora')">
                Meta/Hora
                <span id="metaHoraBtn">R$ 35,00</span>
            </button>
            <button class="btn-action secondary" onclick="toggleMetaEditor('dia')">
                Meta Diária
                <span id="metaDiaBtn">R$ 300,00</span>
            </button>
        </div>

        <div class="meta-editor" id="metaEditor">
            <h3 id="editorTitle">Ajustar Meta</h3>
            <div class="input-group">
                <input type="number" id="metaValueInput" placeholder="Valor em R$" min="1">
                <button class="btn-save" onclick="saveNewMeta()">Salvar</button>
            </div>
        </div>

        <div class="earn-section">
            <p style="font-size: 0.75rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase;">REGISTRAR GANHO DA CORRIDA:</p>
            <div class="earn-input-group">
                <input type="number" id="earnInput" placeholder="R$ 0,00" step="0.01">
                <button class="btn-add" onclick="addEarnings()">+ ADD</button>
            </div>

            <div class="control-row">
                <button class="btn-ctrl btn-ctrl-start" onclick="startTimer()">▶ Iniciar</button>
                <button class="btn-ctrl btn-ctrl-pause" onclick="pauseTimer()">⏸ Pausar</button>
                <button class="btn-ctrl btn-ctrl-reset" onclick="resetApp()">🔄 Zerar</button>
            </div>
        </div>
    </div>

    <script>
        // Registrar Service Worker para permitir instalação
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(() => console.log("Service Worker registrado com sucesso!"))
                .catch(err => console.log("Erro no Service Worker:", err));
        }

        let metaDiaria = 300;
        let metaHora = 35;
        let faturadoDiario = 0; 
        let faturadoHora = 0;

        const TOTAL_SECONDS = 3600;
        let secondsLeft = TOTAL_SECONDS;
        let timerInterval = null;
        let isTimerRunning = false;
        let endTime = null; // Guarda a hora exata em que o timer deve acabar

        const percentageEl = document.getElementById('percentage');
        const progressBarEl = document.getElementById('progressBar');
        const currentDisplayEl = document.getElementById('currentDisplay');
        const remainingDisplayEl = document.getElementById('remainingDisplay');
        const metaHoraBtnEl = document.getElementById('metaHoraBtn');
        const metaDiaBtnEl = document.getElementById('metaDiaBtn');
        const hourlyBarEl = document.getElementById('hourlyBar');
        const hourlyEarnedDisplayEl = document.getElementById('hourlyEarnedDisplay');
        const hourlyTargetDisplayEl = document.getElementById('hourlyTargetDisplay');
        const timerDisplayEl = document.getElementById('timerDisplay');
        const metaEditorEl = document.getElementById('metaEditor');
        const editorTitleEl = document.getElementById('editorTitle');
        const metaValueInputEl = document.getElementById('metaValueInput');
        const earnInputEl = document.getElementById('earnInput');
        let tipoMetaEditando = '';

        function updateUI() {
            metaHoraBtnEl.innerText = `R$ ${metaHora.toFixed(2)}`;
            metaDiaBtnEl.innerText = `R$ ${metaDiaria.toFixed(2)}`;
            hourlyTargetDisplayEl.innerText = `R$ ${metaHora.toFixed(2)}`;

            let porcentagemDiaria = (faturadoDiario / metaDiaria) * 100;
            porcentagemDiaria = Math.max(0, Math.min(100, porcentagemDiaria));
            percentageEl.innerText = `${Math.round(porcentagemDiaria)}%`;
            progressBarEl.style.width = `${porcentagemDiaria}%`;
            currentDisplayEl.innerText = `R$ ${faturadoDiario.toFixed(2)}`;

            let restanteDiario = Math.max(0, metaDiaria - faturadoDiario);
            remainingDisplayEl.innerText = `R$ ${restanteDiario.toFixed(2)}`;

            let porcentagemHoraria = (faturadoHora / metaHora) * 100;
            porcentagemHoraria = Math.max(0, Math.min(100, porcentagemHoraria));
            hourlyEarnedDisplayEl.innerText = `R$ ${faturadoHora.toFixed(2)}`;
            hourlyBarEl.style.width = `${porcentagemHoraria}%`;

            if (faturadoHora >= metaHora) {
                hourlyBarEl.classList.add('completed');
            } else {
                hourlyBarEl.classList.remove('completed');
            }
        }

        // LÓGICA DE TEMPO REAL EM SEGUNDO PLANO
        function startTimer() {
            if (isTimerRunning) return;
            isTimerRunning = true;
            timerDisplayEl.classList.remove('paused');

            // Define o momento exato em que o timer terminará
            endTime = Date.now() + (secondsLeft * 1000);
            localStorage.setItem('endTime', endTime);

            timerInterval = setInterval(() => {
                const now = Date.now();
                secondsLeft = Math.round((endTime - now) / 1000);

                if (secondsLeft <= 0) {
                    faturadoHora = 0;       
                    secondsLeft = TOTAL_SECONDS; 
                    endTime = Date.now() + (TOTAL_SECONDS * 1000);
                    localStorage.setItem('endTime', endTime);
                    alert("1 hora se passou! Meta horária resetada.");
                }

                renderTimer();
                updateUI();
            }, 1000);
        }

        function pauseTimer() {
            if (!isTimerRunning) return;
            clearInterval(timerInterval);
            timerInterval = null;
            isTimerRunning = false;
            timerDisplayEl.classList.add('paused');
            localStorage.removeItem('endTime');
        }

        function renderTimer() {
            const minutes = Math.floor(Math.max(0, secondsLeft) / 60);
            const seconds = Math.max(0, secondsLeft) % 60;
            timerDisplayEl.innerText = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        // Recuperar estado se o app foi fechado/minimizado
        window.addEventListener('focus', () => {
            const savedEndTime = localStorage.getItem('endTime');
            if (savedEndTime && isTimerRunning) {
                endTime = parseInt(savedEndTime);
                const now = Date.now();
                secondsLeft = Math.round((endTime - now) / 1000);
                if (secondsLeft < 0) {
                    faturadoHora = 0;
                    secondsLeft = TOTAL_SECONDS;
                    pauseTimer();
                    startTimer();
                }
                renderTimer();
                updateUI();
            }
        });

        function addEarnings() {
            const valorCorrida = parseFloat(earnInputEl.value);
            if (isNaN(valorCorrida) || valorCorrida <= 0) return;
            faturadoDiario += valorCorrida;
            faturadoHora += valorCorrida;
            earnInputEl.value = ''; 
            updateUI();
        }

        function toggleMetaEditor(tipo) {
            if (metaEditorEl.classList.contains('active') && tipoMetaEditando === tipo) {
                metaEditorEl.classList.remove('active');
            } else {
                tipoMetaEditando = tipo;
                editorTitleEl.innerText = tipo === 'hora' ? 'Definir Meta por Hora' : 'Definir Meta Diária';
                metaValueInputEl.value = tipo === 'hora' ? metaHora : metaDiaria;
                metaEditorEl.classList.add('active');
                metaValueInputEl.focus();
            }
        }

        function saveNewMeta() {
            const novoValor = parseFloat(metaValueInputEl.value);
            if (isNaN(novoValor) || novoValor <= 0) return;
            if (tipoMetaEditando === 'hora') { metaHora = novoValor; } else { metaDiaria = novoValor; }
            metaEditorEl.classList.remove('active');
            updateUI();
        }

        function resetApp() {
            if (confirm('Zerar progresso atual?')) {
                pauseTimer();
                faturadoDiario = 0;
                faturadoHora = 0;
                secondsLeft = TOTAL_SECONDS;
                localStorage.removeItem('endTime');
                updateUI();
                renderTimer();
            }
        }

        renderTimer();
        startTimer();
        updateUI();
    </script>
</body>
  </html>
